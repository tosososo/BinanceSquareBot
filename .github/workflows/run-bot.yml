name: Run BinanceSquareBot

on:
  schedule:
    # 每小时整点执行
    - cron: "0 * * * *"
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write  # 赋予写仓库内容的权限

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Create data directory
        run: |
          mkdir -p data
      - name: Run Polymarket investment research generation and publishing
        if: ${{ success() && vars.ENABLE_POLYMARKET != 'false' }}
        env:
          BINANCE_API_KEYS: ${{ secrets.BINANCE_API_KEYS }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          ENABLE_POLYMARKET: ${{ secrets.ENABLE_POLYMARKET }}
          POLYMARKET_HOST: ${{ secrets.POLYMARKET_HOST }}
          POLYMARKET_CHAIN_ID: ${{ secrets.POLYMARKET_CHAIN_ID }}
          MIN_VOLUME_THRESHOLD: ${{ secrets.MIN_VOLUME_THRESHOLD }}
        run: |
          poetry run binance-square-bot polymarket-research run
          
      - name: Run bot
        env:
          BINANCE_API_KEYS: ${{ secrets.BINANCE_API_KEYS }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          poetry run binance-square-bot run

      

      - name: Commit and push if changes
        env:
          BRANCH_NAME: ${{ github.event.repository.default_branch }}
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'

          echo "🔄 Syncing with remote (branch: $BRANCH_NAME)..."
          git fetch origin $BRANCH_NAME
          git stash --include-untracked || echo "Nothing to stash"

          git reset --hard origin/$BRANCH_NAME

          git stash pop || echo "Nothing to pop"

          git add data/processed_urls.db

          if git diff --quiet && git diff --staged --quiet; then
            echo "📭 No changes to commit"
            exit 0
          fi

          echo "📝 Committing changes..."
          TIMESTAMP=$(TZ=Asia/Shanghai date "+%Y-%m-%d %H:%M:%S")
          git commit -m "Auto update processed_urls.db by BinanceSquareBot at $TIMESTAMP"

          echo "⬆️ Pushing changes with retry..."
          for i in {1..5}; do
            git pull --rebase origin $BRANCH_NAME && git push origin $BRANCH_NAME && {
              echo "✅ Successfully pushed on attempt $i"
              exit 0
            }
            echo "⚠️ Attempt $i failed, waiting $((i*3)) seconds..."
            sleep $((i * 3))
          done

          echo "❌ Failed to push after 5 attempts"
          exit 1
