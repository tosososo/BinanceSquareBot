name: Run BinanceSquareBot

on:
  schedule:
    # 每小时整点执行
    - cron: "0 * * * *"
  workflow_dispatch: # 支持手动触发

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Create data directory
        run: |
          mkdir -p data

      - name: Run bot
        env:
          BINANCE_API_KEYS: ${{ secrets.BINANCE_API_KEYS }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          poetry run binance-square-bot run

      - name: Commit database changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed_urls.db
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "🤖 auto-update: processed_urls.db updated by BinanceSquareBot $(date +'%Y-%m-%d %H:%M')"
          git push

